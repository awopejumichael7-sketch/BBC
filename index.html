<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CAC Good Works Assembly Believers Bible College</title>
<meta name="description" content="Official e-learning platform of CAC Good Works Assembly Believers Bible College">
<meta name="theme-color" content="#0b2545">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-card glass-card">
    <img src="logo.png" class="crest" alt="College Crest">
    <h2 style="color:#0b2545;">CAC Good Works Assembly</h2>
    <p style="color:#66738a;margin-top:-6px;">Believers Bible College</p>

    <div class="role-tabs">
      <button type="button" class="active" data-role="student"><i class="fa-solid fa-user-graduate"></i> Student</button>
      <button type="button" data-role="teacher"><i class="fa-solid fa-chalkboard-user"></i> Teacher</button>
      <button type="button" data-role="admin"><i class="fa-solid fa-user-shield"></i> Admin</button>
    </div>

    <form id="login-form" autocomplete="off">
      <div class="form-field">
        <label id="id-label">Student ID</label>
        <input type="text" id="identifier" placeholder="e.g. STU-2026-1234" required>
      </div>
      <div class="form-field">
        <label id="pass-label">Passcode</label>
        <input type="password" id="secret" placeholder="Enter your passcode" required>
      </div>
      <button type="submit" class="btn-navy w-100" style="width:100%;">
        <i class="fa-solid fa-right-to-bracket"></i> Sign In
      </button>
    </form>

    <p style="font-size:.8rem;color:#66738a;margin-top:14px;">
      Forgot your details? Contact the College Administrator.
    </p>
    <p style="font-size:.72rem;color:#a3adbe;">
      &copy; <span id="year"></span> CAC Good Works Assembly Believers Bible College. All rights reserved.
    </p>
  </div>
</div>

<div id="install-banner">
  <span><i class="fa-solid fa-download"></i> Install this app for the best experience</span>
  <span>
    <button id="install-btn" class="btn-gold">Install</button>
    <button id="install-dismiss" class="btn-outline" style="color:#fff;border-color:#fff;">Not now</button>
  </span>
</div>

<script type="module">
  import { setLoginRole, handleLogin } from "./auth.js";
  import { initInstallBanner, registerServiceWorker, initTheme } from "./app-shell.js";

  document.getElementById("year").textContent = new Date().getFullYear();
  initTheme();
  registerServiceWorker();
  initInstallBanner();

  const roleBtns = document.querySelectorAll(".role-tabs button");
  const idLabel = document.getElementById("id-label");
  const passLabel = document.getElementById("pass-label");
  const idInput = document.getElementById("identifier");

  const labels = {
    student: ["Student ID", "e.g. STU-2026-1234"],
    teacher: ["Teacher ID", "e.g. TCH-2026-5678"],
    admin: ["Admin Email", "e.g. admin@cacgw.app"]
  };

  roleBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      roleBtns.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const role = btn.dataset.role;
      setLoginRole(role);
      idLabel.textContent = labels[role][0];
      idInput.placeholder = labels[role][1];
      idInput.type = role === "admin" ? "email" : "text";
    });
  });

  document.getElementById("login-form").addEventListener("submit", (e) => {
    e.preventDefault();
    const identifier = document.getElementById("identifier").value;
    const secret = document.getElementById("secret").value;
    handleLogin(identifier, secret);
  });
</script>
</body>
</html>
