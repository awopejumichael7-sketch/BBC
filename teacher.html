<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teacher Dashboard — CAC Good Works Bible College</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="brand-bar">
  <img src="logo.png" class="logo" alt="crest">
  <div class="brand-text"><strong>Teacher Portal</strong><small>CAC Good Works Bible College</small></div>
  <div class="spacer"></div>
  <span id="net-status" title="Online" style="width:10px;height:10px;border-radius:50%;background:#1e8e5a;margin-right:10px;"></span>
  <button class="icon-btn" id="theme-btn"><i class="fa-solid fa-moon"></i></button>
  <button class="icon-btn" id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i></button>
</div>

<div class="dash-layout">
  <div class="sidebar">
    <a data-view="overview" class="active"><i class="fa-solid fa-gauge"></i> Overview</a>
    <a data-view="materials"><i class="fa-solid fa-cloud-arrow-up"></i> Upload Materials</a>
    <a data-view="studio"><i class="fa-solid fa-video"></i> Recording Studio</a>
    <a data-view="live"><i class="fa-solid fa-tower-broadcast"></i> Live Class</a>
    <a data-view="attendance"><i class="fa-solid fa-clipboard-check"></i> Attendance</a>
    <a data-view="questions"><i class="fa-solid fa-comments"></i> Student Questions</a>
    <a data-view="feedback"><i class="fa-solid fa-star"></i> Feedback</a>
  </div>
  <div class="main-content" id="main-content">
    <div class="skeleton" style="height:200px;"></div>
  </div>
</div>

<script type="module" src="teacher.js"></script>
</body>
</html>
