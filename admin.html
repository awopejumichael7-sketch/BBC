<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Dashboard — CAC Good Works Bible College</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="brand-bar">
  <img src="logo.png" class="logo" alt="crest">
  <div class="brand-text"><strong>Administrator</strong><small>CAC Good Works Bible College</small></div>
  <div class="spacer"></div>
  <span id="net-status" title="Online" style="width:10px;height:10px;border-radius:50%;background:#1e8e5a;margin-right:10px;"></span>
  <button class="icon-btn" id="theme-btn" title="Toggle theme"><i class="fa-solid fa-moon"></i></button>
  <button class="icon-btn" id="logout-btn" title="Log out"><i class="fa-solid fa-right-from-bracket"></i></button>
</div>

<div class="dash-layout">
  <div class="sidebar" id="sidebar">
    <a data-view="overview" class="active"><i class="fa-solid fa-gauge"></i> Overview</a>
    <a data-view="teachers"><i class="fa-solid fa-chalkboard-user"></i> Teachers</a>
    <a data-view="students"><i class="fa-solid fa-user-graduate"></i> Students</a>
    <a data-view="courses"><i class="fa-solid fa-book-bible"></i> Courses</a>
    <a data-view="content"><i class="fa-solid fa-cloud-arrow-up"></i> Content Uploads</a>
    <a data-view="exams"><i class="fa-solid fa-file-pen"></i> Exam Questions</a>
    <a data-view="announcements"><i class="fa-solid fa-bullhorn"></i> Announcements</a>
    <a data-view="feedback"><i class="fa-solid fa-comments"></i> Feedback</a>
    <a data-view="reports"><i class="fa-solid fa-chart-column"></i> Reports & Analytics</a>
    <a data-view="logs"><i class="fa-solid fa-clock-rotate-left"></i> Activity Logs</a>
  </div>

  <div class="main-content" id="main-content">
    <!-- Views are rendered here by admin.js -->
    <div class="skeleton" style="height:200px;"></div>
  </div>
</div>

<script type="module" src="admin.js"></script>
</body>
</html>
