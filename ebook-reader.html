<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reader — CAC Good Works Bible College</title>
<link rel="icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="brand-bar">
  <button class="icon-btn" onclick="window.close()"><i class="fa-solid fa-arrow-left"></i></button>
  <div class="brand-text"><strong id="doc-title">Reader</strong><small>CAC Good Works Bible College</small></div>
  <div class="spacer"></div>
  <button class="icon-btn" id="dark-toggle" title="Toggle dark/light"><i class="fa-solid fa-moon"></i></button>
</div>

<div class="reader-shell">
  <div class="reader-toolbar glass-card">
    <button id="font-minus" title="Smaller text"><i class="fa-solid fa-minus"></i> A</button>
    <button id="font-plus" title="Larger text">A <i class="fa-solid fa-plus"></i></button>
    <select id="line-spacing" title="Line spacing">
      <option value="1.5">Compact</option>
      <option value="1.9" selected>Comfortable</option>
      <option value="2.3">Relaxed</option>
    </select>
    <select id="translate-lang" title="Translate">
      <option value="">🌐 Translate…</option>
      <option value="en">English</option>
      <option value="yo">Yoruba</option>
      <option value="fr">French</option>
      <option value="es">Spanish</option>
      <option value="pt">Portuguese</option>
      <option value="ar">Arabic</option>
      <option value="zh">Chinese</option>
      <option value="de">German</option>
      <option value="it">Italian</option>
      <option value="ru">Russian</option>
      <option value="hi">Hindi</option>
      <option value="sw">Swahili</option>
    </select>
    <button id="bookmark-btn" title="Bookmark this page"><i class="fa-regular fa-bookmark"></i></button>
    <button id="highlight-btn" title="Highlight selected text"><i class="fa-solid fa-highlighter"></i></button>
    <button id="listen-btn" title="Listen to this page read aloud"><i class="fa-solid fa-volume-high"></i> Listen</button>
    <input id="search-box" placeholder="Search in document…" style="flex:1;min-width:160px;padding:8px 12px;border-radius:10px;border:1px solid #d8dde8;">
  </div>

  <div id="toc-box" class="glass-card" style="margin-bottom:14px;display:none;"></div>

  <div class="reader-page" id="reader-page">
    <p style="text-align:center;color:var(--muted);">Loading document…</p>
  </div>

  <p id="reader-note" style="color:var(--muted);font-size:.8rem;margin-top:10px;">
    <i class="fa-solid fa-circle-info"></i> This is protected reading-only content — copying and downloading are disabled.
  </p>
</div>

<script type="module" src="ebook-reader.js"></script>
</body>
</html>
